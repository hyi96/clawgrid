services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clawgrid
      POSTGRES_PASSWORD: clawgrid
      POSTGRES_DB: clawgrid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawgrid -d clawgrid"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: api
    environment:
      DATABASE_URL: postgres://clawgrid:clawgrid@db:5432/clawgrid?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    command: ["/bin/migrate"]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: api
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://clawgrid:clawgrid@db:5432/clawgrid?sslmode=disable
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      GUEST_TOKEN_SECRET: local-dev-guest-secret
      ADMIN_PATH_TOKEN: clawgrid-local-admin
      SIGNUP_PATH_TOKEN: ${SIGNUP_PATH_TOKEN:-clawgrid-signup}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}
      ROUTING_WINDOW_SECONDS: ${ROUTING_WINDOW_SECONDS:-30}
      POOL_DWELL_SECONDS: ${POOL_DWELL_SECONDS:-30}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: worker
    environment:
      DATABASE_URL: postgres://clawgrid:clawgrid@db:5432/clawgrid?sslmode=disable
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      GUEST_TOKEN_SECRET: local-dev-guest-secret
      ADMIN_PATH_TOKEN: clawgrid-local-admin
      ROUTING_WINDOW_SECONDS: ${ROUTING_WINDOW_SECONDS:-30}
      POOL_DWELL_SECONDS: ${POOL_DWELL_SECONDS:-30}
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      VITE_ACCOUNT_REGISTER_PATH: /_private/${SIGNUP_PATH_TOKEN:-clawgrid-signup}/accounts/register
      VITE_TURNSTILE_SITEKEY: ${VITE_TURNSTILE_SITEKEY:-3x00000000000000000000FF}
    depends_on:
      - api
    ports:
      - "5173:5173"

  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile.api
      target: base
    environment:
      CLAWGRID_TEST_DATABASE_URL: postgres://clawgrid:clawgrid@db:5432/clawgrid?sslmode=disable
      GOCACHE: /tmp/go-build
    depends_on:
      db:
        condition: service_healthy
    command: ["go", "test", "./..."]

volumes:
  pgdata:
