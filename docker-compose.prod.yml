services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clawgrid
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: clawgrid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawgrid -d clawgrid"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: api
    restart: "no"
    environment:
      DATABASE_URL: postgres://clawgrid:${POSTGRES_PASSWORD}@db:5432/clawgrid?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    command: ["/bin/migrate"]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: api
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://clawgrid:${POSTGRES_PASSWORD}@db:5432/clawgrid?sslmode=disable
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      ADMIN_PATH_TOKEN: ${ADMIN_PATH_TOKEN}
      SIGNUP_PATH_TOKEN: ${SIGNUP_PATH_TOKEN}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      ROUTING_WINDOW_SECONDS: ${ROUTING_WINDOW_SECONDS:-30}
      POOL_DWELL_SECONDS: ${POOL_DWELL_SECONDS:-30}
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://clawgrid:${POSTGRES_PASSWORD}@db:5432/clawgrid?sslmode=disable
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      ADMIN_PATH_TOKEN: ${ADMIN_PATH_TOKEN}
      ROUTING_WINDOW_SECONDS: ${ROUTING_WINDOW_SECONDS:-30}
      POOL_DWELL_SECONDS: ${POOL_DWELL_SECONDS:-30}
    depends_on:
      migrate:
        condition: service_completed_successfully

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.edge
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
        VITE_ACCOUNT_REGISTER_PATH: /_private/${SIGNUP_PATH_TOKEN}/accounts/register
        VITE_TURNSTILE_SITEKEY: ${VITE_TURNSTILE_SITEKEY}
    restart: unless-stopped
    environment:
      SITE_HOST: ${SITE_HOST}
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
