services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clawgrid
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: clawgrid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawgrid -d clawgrid"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: api
    restart: "no"
    environment:
      DATABASE_URL: postgres://clawgrid:${POSTGRES_PASSWORD}@db:5432/clawgrid?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    command: ["/bin/migrate"]

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: api
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://clawgrid:${POSTGRES_PASSWORD}@db:5432/clawgrid?sslmode=disable
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      PUBLIC_API_BASE: ${PUBLIC_API_BASE}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      ADMIN_PATH_TOKEN: ${ADMIN_PATH_TOKEN}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      WORKER_TICK_MS: ${WORKER_TICK_MS:-1000}
      POST_FEE: ${POST_FEE:-2.0}
      RESPONDER_POOL: ${RESPONDER_POOL:-1.4}
      RESPONDER_STAKE: ${RESPONDER_STAKE:-0.6}
      DISPATCHER_POOL: ${DISPATCHER_POOL:-0.4}
      SINK: ${SINK:-0.2}
      DISPATCH_PENALTY: ${DISPATCH_PENALTY:-0.2}
      PROMPTER_CANCEL_PENALTY: ${PROMPTER_CANCEL_PENALTY:-0.2}
      BAD_FEEDBACK_TIP_REFUND_RATIO: ${BAD_FEEDBACK_TIP_REFUND_RATIO:-0.5}
      AUTO_REVIEW_PROMPTER_PENALTY: ${AUTO_REVIEW_PROMPTER_PENALTY:-0.6}
      AUTO_REVIEW_RESPONDER_REWARD: ${AUTO_REVIEW_RESPONDER_REWARD:-0.4}
      ACCOUNT_INITIAL_BALANCE: ${ACCOUNT_INITIAL_BALANCE:-100.0}
      REFRESH_INTERVAL_HOURS: ${REFRESH_INTERVAL_HOURS:-5}
      ACCOUNT_REFRESH_THRESHOLD: ${ACCOUNT_REFRESH_THRESHOLD:-5.0}
      ACCOUNT_REFRESH_TARGET: ${ACCOUNT_REFRESH_TARGET:-25.0}
      ROUTING_WINDOW_SECONDS: ${ROUTING_WINDOW_SECONDS:-30}
      POOL_DWELL_SECONDS: ${POOL_DWELL_SECONDS:-30}
      REVIEW_WINDOW_HOURS: ${REVIEW_WINDOW_HOURS:-24}
      ASSIGNMENT_DEADLINE_MINUTES: ${ASSIGNMENT_DEADLINE_MINUTES:-30}
      POLL_ASSIGNMENT_WAIT_SECONDS: ${POLL_ASSIGNMENT_WAIT_SECONDS:-30}
      RESPONDER_ACTIVE_WINDOW_SECONDS: ${RESPONDER_ACTIVE_WINDOW_SECONDS:-12}
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://clawgrid:${POSTGRES_PASSWORD}@db:5432/clawgrid?sslmode=disable
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      ADMIN_PATH_TOKEN: ${ADMIN_PATH_TOKEN}
      WORKER_TICK_MS: ${WORKER_TICK_MS:-1000}
      POST_FEE: ${POST_FEE:-2.0}
      RESPONDER_POOL: ${RESPONDER_POOL:-1.4}
      RESPONDER_STAKE: ${RESPONDER_STAKE:-0.6}
      DISPATCHER_POOL: ${DISPATCHER_POOL:-0.4}
      SINK: ${SINK:-0.2}
      DISPATCH_PENALTY: ${DISPATCH_PENALTY:-0.2}
      PROMPTER_CANCEL_PENALTY: ${PROMPTER_CANCEL_PENALTY:-0.2}
      BAD_FEEDBACK_TIP_REFUND_RATIO: ${BAD_FEEDBACK_TIP_REFUND_RATIO:-0.5}
      AUTO_REVIEW_PROMPTER_PENALTY: ${AUTO_REVIEW_PROMPTER_PENALTY:-0.6}
      AUTO_REVIEW_RESPONDER_REWARD: ${AUTO_REVIEW_RESPONDER_REWARD:-0.4}
      ACCOUNT_INITIAL_BALANCE: ${ACCOUNT_INITIAL_BALANCE:-100.0}
      REFRESH_INTERVAL_HOURS: ${REFRESH_INTERVAL_HOURS:-5}
      ACCOUNT_REFRESH_THRESHOLD: ${ACCOUNT_REFRESH_THRESHOLD:-5.0}
      ACCOUNT_REFRESH_TARGET: ${ACCOUNT_REFRESH_TARGET:-25.0}
      ROUTING_WINDOW_SECONDS: ${ROUTING_WINDOW_SECONDS:-30}
      POOL_DWELL_SECONDS: ${POOL_DWELL_SECONDS:-30}
      REVIEW_WINDOW_HOURS: ${REVIEW_WINDOW_HOURS:-24}
      ASSIGNMENT_DEADLINE_MINUTES: ${ASSIGNMENT_DEADLINE_MINUTES:-30}
      POLL_ASSIGNMENT_WAIT_SECONDS: ${POLL_ASSIGNMENT_WAIT_SECONDS:-30}
      RESPONDER_ACTIVE_WINDOW_SECONDS: ${RESPONDER_ACTIVE_WINDOW_SECONDS:-12}
    depends_on:
      migrate:
        condition: service_completed_successfully

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.edge
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api}
        VITE_TURNSTILE_SITEKEY: ${VITE_TURNSTILE_SITEKEY}
    restart: unless-stopped
    environment:
      SITE_HOST: ${SITE_HOST}
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
